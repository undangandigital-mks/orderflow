<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Order - Vi Printing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-dark: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark);
            -webkit-tap-highlight-color: transparent;
            color: #f1f5f9;
        }

        /* Desktop specific height, mobile allows scrolling */
        @media (min-width: 1024px) {
            body { overflow: hidden; }
            #displayContainer {
                height: calc(100vh - 280px);
                overflow: hidden;
            }
        }

        .status-badge {
            @apply px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-widest border;
        }

        .priority-high { border-left: 4px solid #ef4444; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #3b82f6; }
        
        .page-transition {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .checkmark-ready {
            @apply flex items-center justify-center bg-emerald-500/20 text-emerald-400 w-8 h-8 rounded-full border border-emerald-500/30;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="loadingOverlay">
        <div class="text-center px-6">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-blue-400 text-xs font-bold animate-pulse uppercase tracking-[0.2em]">Menghubungkan Database...</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="bg-slate-900/90 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg">
                        <i class="fas fa-print text-white text-sm"></i>
                    </div>
                    <div>
                        <h1 class="text-sm md:text-xl font-black text-white leading-tight">VI PRINTING</h1>
                        <p class="text-[8px] md:text-[10px] text-blue-400 font-bold tracking-widest uppercase">Live Production</p>
                    </div>
                </div>
                <div class="text-right">
                    <p id="liveTime" class="text-lg md:text-2xl font-black font-mono text-white tracking-wider">00:00:00</p>
                    <p id="liveDate" class="text-[8px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest">Memuat...</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-4">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
            <div class="bg-slate-800/40 border border-slate-700/50 p-3 rounded-2xl backdrop-blur-md">
                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1 text-center">Total Order</p>
                <h3 class="text-xl font-black text-white text-center" id="stat-total">0</h3>
            </div>
            <div class="bg-blue-600/10 border border-blue-500/20 p-3 rounded-2xl backdrop-blur-md">
                <p class="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-1 text-center">Antrean</p>
                <h3 class="text-xl font-black text-blue-400 text-center" id="stat-pending">0</h3>
            </div>
            <div class="bg-rose-600/10 border border-rose-500/20 p-3 rounded-2xl backdrop-blur-md">
                <p class="text-[8px] font-black text-rose-500 uppercase tracking-widest mb-1 text-center">Prioritas</p>
                <h3 class="text-xl font-black text-rose-400 text-center" id="stat-priority">0</h3>
            </div>
            <div class="bg-emerald-600/10 border border-emerald-500/20 p-3 rounded-2xl backdrop-blur-md">
                <p class="text-[8px] font-black text-emerald-500 uppercase tracking-widest mb-1 text-center">Selesai</p>
                <h3 class="text-xl font-black text-emerald-400 text-center" id="stat-completed">0</h3>
            </div>
        </div>

        <!-- Desktop Table Header -->
        <div class="hidden lg:block bg-slate-900/90 rounded-t-[2.5rem] border-x border-t border-slate-700/30 overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-slate-700/50">
                        <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[20%]">Pelanggan</th>
                        <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[25%]">Pekerjaan</th>
                        <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[25%] text-center">Deadline</th>
                        <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[15%]">Kesiapan</th>
                        <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[15%] text-right">Status</th>
                    </tr>
                </thead>
            </table>
        </div>

        <!-- Main Content Area -->
        <div id="displayContainer" class="bg-slate-800/20 rounded-2xl lg:rounded-none lg:rounded-b-[2.5rem] border border-slate-700/30 lg:border-t-0 shadow-2xl overflow-hidden">
            <!-- Desktop Body -->
            <table class="hidden lg:table w-full text-left border-collapse">
                <tbody class="divide-y divide-slate-700/30" id="orderTableBody"></tbody>
            </table>
            
            <!-- Mobile Body -->
            <div id="orderMobileBody" class="lg:hidden flex flex-col divide-y divide-slate-700/50 max-h-[70vh] overflow-y-auto no-scrollbar"></div>
        </div>

        <!-- Footer Info Desktop Only -->
        <div class="hidden lg:flex justify-between items-center mt-6 px-4">
            <div class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700">
                <p class="text-xs font-bold text-white text-center">Halaman <span id="pageNum">1 / 1</span></p>
            </div>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest italic">Data diperbarui otomatis setiap 60 detik</p>
        </div>
        
        <!-- Mobile Swipe Info -->
        <div class="lg:hidden text-center mt-4">
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest animate-bounce">
                <i class="fas fa-chevron-down mr-2"></i> Geser ke bawah untuk melihat semua antrean
            </p>
        </div>
    </main>

    <script>
        const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vSa9hLZ0D_dxIG6__JPKMElhpAHD2opjifL37jOJTPj7pQjUDX2Nseg4TDlckSy89ahJvHbiBA7FV5k/pub?gid=0&single=true&output=csv`;
        
        let allOrdersRaw = []; 
        let activeOrders = []; 
        let currentPage = 0;
        const desktopItemsPerPage = 6;
        let initialLoad = true;

        async function fetchData(forceRenderMobile = false) {
            try {
                const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        const newData = results.data.map(d => ({
                            id: d['ID'] || '-',
                            customer: d['Customer'] || 'Unknown',
                            jobName: d['Job Name'] || '-',
                            quantity: d['Qty'] || '0',
                            priority: d['Priority'] || 'Low',
                            status: d['Status'] || 'Pending',
                            finalDeadline: d['Final Deadline'] || '',
                            statusDeadline: d['Status Deadline'] || '',
                            equipment: d['Equipment'] || '',
                            checkedEquipment: d['Checked Equipment'] || ''
                        }));

                        // Cek apakah data benar-benar berubah untuk menghindari re-render mobile yang tidak perlu
                        const dataChanged = JSON.stringify(newData) !== JSON.stringify(allOrdersRaw);

                        if (dataChanged || forceRenderMobile || initialLoad) {
                            allOrdersRaw = newData;
                            activeOrders = allOrdersRaw.filter(order => {
                                const statusUpper = order.status.toUpperCase();
                                return statusUpper !== 'COMPLETED' && statusUpper !== 'SELESAI';
                            });
                            
                            updateStats();
                            renderContent(true); // Render ulang keduanya jika ada perubahan data
                        }

                        if (initialLoad) {
                            const loader = document.getElementById('loadingOverlay');
                            loader.style.opacity = '0';
                            setTimeout(() => loader.style.display = 'none', 500);
                            initialLoad = false;
                        }
                    }
                });
            } catch (error) {
                console.error("Database Error:", error);
            }
        }

        function getRelativeTime(dateStr) {
            if (!dateStr || dateStr.trim() === "") return { text: 'TBA', color: 'text-slate-500' };
            const target = new Date(dateStr);
            if (isNaN(target.getTime())) return { text: dateStr, color: 'text-slate-300' };
            target.setHours(0, 0, 0, 0);
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const diffDays = Math.round((target - now) / (1000 * 60 * 60 * 24));
            if (diffDays === 0) return { text: 'Hari Ini', color: 'text-amber-400 font-bold' };
            if (diffDays === 1) return { text: 'Besok', color: 'text-blue-400' };
            if (diffDays > 1) return { text: `${diffDays} Hari`, color: 'text-emerald-400' };
            if (diffDays < 0) return { text: `Telat ${Math.abs(diffDays)} H`, color: 'text-rose-500 font-black' };
            return { text: dateStr, color: 'text-slate-300' };
        }

        function renderContent(updateMobile = false) {
            const tbody = document.getElementById('orderTableBody');
            const mobileBody = document.getElementById('orderMobileBody');
            const isDesktop = window.innerWidth >= 1024;

            // Render Desktop (Paginated) - Selalu update untuk keperluan loop halaman
            const totalPages = Math.ceil(activeOrders.length / desktopItemsPerPage);
            if (currentPage >= totalPages) currentPage = 0;
            const desktopData = activeOrders.slice(currentPage * desktopItemsPerPage, (currentPage + 1) * desktopItemsPerPage);
            
            document.getElementById('pageNum').innerText = `${currentPage + 1} / ${totalPages || 1}`;
            
            tbody.innerHTML = desktopData.length ? '' : '<tr><td colspan="5" class="py-20 text-center text-slate-500 uppercase tracking-widest">Antrean Kosong</td></tr>';
            desktopData.forEach(order => {
                tbody.insertAdjacentHTML('beforeend', createDesktopRow(order));
            });

            // Render Mobile (Hanya jika data berubah atau dipicu manual)
            // Ini mencegah kartu ter-refresh saat user sedang scroll di mobile
            if (updateMobile || !mobileBody.children.length) {
                mobileBody.innerHTML = activeOrders.length ? '' : '<div class="p-10 text-center text-slate-500 uppercase tracking-widest text-xs">Semua Pekerjaan Selesai</div>';
                activeOrders.forEach(order => {
                    mobileBody.insertAdjacentHTML('beforeend', createMobileCard(order));
                });
            }
        }

        function createDesktopRow(order) {
            const statusClasses = { 'Pending': 'bg-slate-700/50 text-slate-400', 'Process': 'bg-blue-500/20 text-blue-400', 'Finishing': 'bg-purple-500/20 text-purple-400' };
            const priorityClass = order.priority === 'High' ? 'priority-high' : order.priority === 'Medium' ? 'priority-medium' : 'priority-low';
            const progress = calculateProgress(order);
            const eqUI = progress === 100 ? `<div class="checkmark-ready"><i class="fas fa-check text-xs"></i></div>` : `<div class="w-24 bg-slate-900 h-1.5 rounded-full overflow-hidden border border-slate-700/50"><div class="bg-blue-600 h-full" style="width: ${progress}%"></div></div>`;

            return `
                <tr class="bg-slate-800/10 page-transition ${priorityClass}">
                    <td class="px-8 py-6">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-mono text-slate-500 mb-1 tracking-widest">${order.id}</span>
                            <span class="font-bold text-lg text-white tracking-tight">${order.customer}</span>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        <span class="text-base font-semibold text-slate-200">${order.jobName}</span>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Qty: ${order.quantity}</p>
                    </td>
                    <td class="px-8 py-6 text-center">
                        <div class="flex justify-center gap-6">
                            <div><p class="text-[8px] font-black text-slate-500 uppercase mb-1">Tahap</p><span class="text-xs font-bold ${getRelativeTime(order.statusDeadline).color}">${getRelativeTime(order.statusDeadline).text}</span></div>
                            <div class="w-[1px] h-8 bg-slate-700/50"></div>
                            <div><p class="text-[8px] font-black text-slate-500 uppercase mb-1">Final</p><span class="text-xs font-bold ${getRelativeTime(order.finalDeadline).color}">${getRelativeTime(order.finalDeadline).text}</span></div>
                        </div>
                    </td>
                    <td class="px-8 py-6"><div class="flex items-center gap-3">${eqUI}<span class="text-[10px] font-bold text-slate-500">${progress}%</span></div></td>
                    <td class="px-8 py-6 text-right"><span class="status-badge ${statusClasses[order.status] || 'bg-slate-700 text-slate-400'}">${order.status}</span></td>
                </tr>
            `;
        }

        function createMobileCard(order) {
            const statusClasses = { 'Pending': 'bg-slate-700/50 text-slate-400', 'Process': 'bg-blue-500/20 text-blue-400', 'Finishing': 'bg-purple-500/20 text-purple-400' };
            const priorityClass = order.priority === 'High' ? 'priority-high' : order.priority === 'Medium' ? 'priority-medium' : 'priority-low';
            const progress = calculateProgress(order);
            const eqUI = progress === 100 ? `<div class="checkmark-ready"><i class="fas fa-check text-[10px]"></i></div>` : `<div class="w-16 bg-slate-900 h-1 rounded-full overflow-hidden border border-slate-700/50"><div class="bg-blue-600 h-full" style="width: ${progress}%"></div></div>`;

            const deadlineTahap = getRelativeTime(order.statusDeadline);
            const deadlineFinal = getRelativeTime(order.finalDeadline);

            return `
                <div class="p-5 bg-slate-800/10 ${priorityClass} page-transition">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[8px] font-mono text-slate-500 tracking-widest">${order.id}</span>
                            <h4 class="font-bold text-base text-white leading-tight">${order.customer}</h4>
                        </div>
                        <span class="status-badge ${statusClasses[order.status] || 'bg-slate-700'}">${order.status}</span>
                    </div>
                    
                    <div class="mb-4">
                        <p class="text-sm text-slate-300 font-semibold">${order.jobName}</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase mt-0.5">ESTIMASI QTY: ${order.quantity}</p>
                    </div>

                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-3 bg-slate-900/40 p-3 rounded-xl border border-slate-700/20">
                            <div>
                                <p class="text-[8px] font-black text-slate-500 uppercase mb-0.5">Deadline Tahap</p>
                                <p class="text-[11px] font-bold ${deadlineTahap.color}">${deadlineTahap.text}</p>
                            </div>
                            <div class="text-right border-l border-slate-700/50 pl-3">
                                <p class="text-[8px] font-black text-slate-500 uppercase mb-0.5">Deadline Final</p>
                                <p class="text-[11px] font-bold ${deadlineFinal.color}">${deadlineFinal.text}</p>
                            </div>
                        </div>

                        <div class="flex items-center justify-between bg-slate-900/20 p-2 rounded-lg px-3">
                            <p class="text-[8px] font-black text-slate-500 uppercase">Kesiapan Alat</p>
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-bold text-slate-400">${progress}%</span>
                                ${eqUI}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function calculateProgress(order) {
            const allEq = order.equipment ? order.equipment.split(',').filter(e => e.trim() !== "") : [];
            const checkedEq = order.checkedEquipment ? order.checkedEquipment.split(',').filter(e => e.trim() !== "") : [];
            return allEq.length > 0 ? Math.round((checkedEq.length / allEq.length) * 100) : 100;
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = allOrdersRaw.length;
            document.getElementById('stat-pending').innerText = activeOrders.length;
            document.getElementById('stat-priority').innerText = activeOrders.filter(o => o.priority === 'High').length;
            document.getElementById('stat-completed').innerText = allOrdersRaw.length - activeOrders.length;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('liveDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' });
        }

        window.addEventListener('resize', () => renderContent(true));

        window.onload = () => {
            fetchData(true);
            
            // Interval tarik data dari server (60 detik)
            setInterval(() => fetchData(), 60000); 
            
            // Loop navigasi halaman (Hanya untuk Desktop)
            setInterval(() => { 
                if (window.innerWidth >= 1024) {
                    const totalPages = Math.ceil(activeOrders.length / desktopItemsPerPage);
                    if (totalPages > 1) {
                        currentPage = (currentPage + 1) % totalPages;
                        renderContent(false); // Update desktop saja (parameter false agar mobile tidak refresh)
                    }
                }
            }, 10000); 

            setInterval(updateClock, 1000);
            updateClock();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Order - Vi Printing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-dark: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark);
            -webkit-tap-highlight-color: transparent;
        }

        /* Desktop specific height, mobile uses auto */
        @media (min-width: 1024px) {
            body { overflow: hidden; }
            #displayContainer {
                height: calc(100vh - 280px);
                overflow: hidden;
            }
        }

        .status-badge {
            @apply px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-widest border;
        }

        .priority-high { border-left: 4px solid #ef4444; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #3b82f6; }
        
        .page-transition {
            animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .checkmark-ready {
            @apply flex items-center justify-center bg-emerald-500/20 text-emerald-400 w-8 h-8 rounded-full border border-emerald-500/30;
        }

        /* Custom Scrollbar for Mobile */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen">

    <div id="loadingOverlay">
        <div class="text-center px-6">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-blue-400 text-xs font-bold animate-pulse uppercase tracking-[0.2em]">Menghubungkan ke Server...</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 md:py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="bg-blue-600 p-2 md:p-3 rounded-xl md:rounded-2xl shadow-lg shadow-blue-500/20">
                        <i class="fas fa-print text-white text-sm md:text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-sm md:text-xl font-black tracking-tight text-white leading-tight">VI PRODUCTION</h1>
                        <p class="text-[8px] md:text-[10px] text-blue-400 font-bold tracking-[0.1em] md:tracking-[0.3em] uppercase">Live Monitoring</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 md:gap-8">
                    <div class="hidden sm:block bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">
                        <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest block text-center">Page</span>
                        <p class="text-xs font-bold text-white text-center" id="pageNum">1 / 1</p>
                    </div>
                    <div class="text-right">
                        <p id="liveTime" class="text-lg md:text-2xl font-black font-mono text-white tracking-wider leading-none">00:00:00</p>
                        <p id="liveDate" class="text-[8px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Memuat...</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-4 md:py-6">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-6 mb-6 md:mb-8">
            <div class="bg-slate-800/40 border border-slate-700/50 p-3 md:p-5 rounded-2xl md:rounded-3xl backdrop-blur-md">
                <p class="text-[8px] md:text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 text-center">Total Order</p>
                <h3 class="text-xl md:text-3xl font-black text-white text-center" id="stat-total">0</h3>
            </div>
            <div class="bg-blue-600/10 border border-blue-500/20 p-3 md:p-5 rounded-2xl md:rounded-3xl backdrop-blur-md">
                <p class="text-[8px] md:text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1 text-center">Antrean</p>
                <h3 class="text-xl md:text-3xl font-black text-blue-400 text-center" id="stat-pending">0</h3>
            </div>
            <div class="bg-rose-600/10 border border-rose-500/20 p-3 md:p-5 rounded-2xl md:rounded-3xl backdrop-blur-md">
                <p class="text-[8px] md:text-[10px] font-black text-rose-500 uppercase tracking-widest mb-1 text-center">Prioritas</p>
                <h3 class="text-xl md:text-3xl font-black text-rose-400 text-center" id="stat-priority">0</h3>
            </div>
            <div class="bg-emerald-600/10 border border-emerald-500/20 p-3 md:p-5 rounded-2xl md:rounded-3xl backdrop-blur-md">
                <p class="text-[8px] md:text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1 text-center">Selesai</p>
                <h3 class="text-xl md:text-3xl font-black text-emerald-400 text-center" id="stat-completed">0</h3>
            </div>
        </div>

        <!-- Tabel Monitoring (Desktop) / Cards (Mobile) -->
        <div class="bg-slate-800/20 rounded-2xl md:rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-700/30">
            <!-- Header khusus Desktop -->
            <div class="hidden lg:block">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-900/90 border-b border-slate-700/50">
                            <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[20%]">Pelanggan</th>
                            <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[25%]">Pekerjaan</th>
                            <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[25%] text-center">Deadline</th>
                            <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[15%]">Kesiapan</th>
                            <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.3em] w-[15%] text-right">Status</th>
                        </tr>
                    </thead>
                </table>
            </div>

            <!-- Kontainer Data Dinamis -->
            <div id="displayContainer">
                <!-- Desktop Table Body -->
                <table class="hidden lg:table w-full text-left border-collapse">
                    <tbody class="divide-y divide-slate-700/30" id="orderTableBody"></tbody>
                </table>
                <!-- Mobile List Body -->
                <div id="orderMobileBody" class="lg:hidden flex flex-col divide-y divide-slate-700/50"></div>
            </div>
        </div>

        <!-- Mobile Pagination Info -->
        <div class="lg:hidden flex justify-center mt-4">
            <span class="bg-slate-800 px-4 py-1 rounded-full text-[10px] font-bold text-slate-400 uppercase tracking-widest border border-slate-700">
                Halaman <span id="mobilePageNum">1 / 1</span>
            </span>
        </div>
    </main>

    <script>
        const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vSa9hLZ0D_dxIG6__JPKMElhpAHD2opjifL37jOJTPj7pQjUDX2Nseg4TDlckSy89ahJvHbiBA7FV5k/pub?gid=0&single=true&output=csv`;
        
        let allOrdersRaw = []; 
        let activeOrders = []; 
        let currentPage = 0;
        let itemsPerPage = 6;
        let initialLoad = true;

        // Detect screen size to adjust items per page
        function adjustItemsPerPage() {
            itemsPerPage = window.innerWidth < 1024 ? 5 : 6;
        }

        async function fetchData() {
            try {
                const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        allOrdersRaw = results.data.map(d => ({
                            id: d['ID'] || '-',
                            customer: d['Customer'] || 'Unknown',
                            jobName: d['Job Name'] || '-',
                            quantity: d['Qty'] || '0',
                            priority: d['Priority'] || 'Low',
                            status: d['Status'] || 'Pending',
                            finalDeadline: d['Final Deadline'] || '',
                            statusDeadline: d['Status Deadline'] || '',
                            equipment: d['Equipment'] || '',
                            checkedEquipment: d['Checked Equipment'] || ''
                        }));

                        activeOrders = allOrdersRaw.filter(order => {
                            const statusUpper = order.status.toUpperCase();
                            return statusUpper !== 'COMPLETED' && statusUpper !== 'SELESAI';
                        });
                        
                        if (initialLoad) {
                            const loader = document.getElementById('loadingOverlay');
                            if (loader) {
                                loader.style.opacity = '0';
                                setTimeout(() => loader.style.display = 'none', 500);
                            }
                            renderPage();
                            initialLoad = false;
                        }
                        
                        updateStats();
                    }
                });
            } catch (error) {
                console.error("Gagal sinkronisasi database:", error);
            }
        }

        function getRelativeTime(dateStr) {
            if (!dateStr || dateStr.trim() === "") return { text: 'TBA', color: 'text-slate-500' };
            const target = new Date(dateStr);
            if (isNaN(target.getTime())) return { text: dateStr, color: 'text-slate-300' };

            target.setHours(0, 0, 0, 0);
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const diffDays = Math.round((target - now) / (1000 * 60 * 60 * 24));

            if (diffDays === 0) return { text: 'Hari Ini', color: 'text-amber-400 font-black animate-pulse' };
            if (diffDays === 1) return { text: 'Besok', color: 'text-blue-400' };
            if (diffDays > 1) return { text: `Sisa ${diffDays} Hari`, color: 'text-emerald-400' };
            if (diffDays < 0) return { text: `Telat ${Math.abs(diffDays)} H`, color: 'text-rose-500 font-black' };
            return { text: dateStr, color: 'text-slate-300' };
        }

        function renderPage() {
            const tbody = document.getElementById('orderTableBody');
            const mobileBody = document.getElementById('orderMobileBody');
            const totalPages = Math.ceil(activeOrders.length / itemsPerPage);
            
            if (currentPage >= totalPages) currentPage = 0;
            const pageData = activeOrders.slice(currentPage * itemsPerPage, (currentPage + 1) * itemsPerPage);
            
            const pageText = activeOrders.length ? `${currentPage + 1} / ${totalPages}` : "0 / 0";
            document.getElementById('pageNum').innerText = pageText;
            document.getElementById('mobilePageNum').innerText = pageText;

            // Clear previous
            tbody.innerHTML = '';
            mobileBody.innerHTML = '';

            if (!activeOrders.length) {
                const emptyMsg = `<tr><td colspan="5" class="px-8 py-24 text-center text-slate-500 font-bold uppercase tracking-[0.3em] opacity-50">Semua Target Produksi Selesai</td></tr>`;
                const emptyMsgMobile = `<div class="px-8 py-24 text-center text-slate-500 font-bold uppercase tracking-[0.2em] opacity-50">Antrean Kosong</div>`;
                tbody.innerHTML = emptyMsg;
                mobileBody.innerHTML = emptyMsgMobile;
                return;
            }

            pageData.forEach(order => {
                const statusClasses = {
                    'Pending': 'bg-slate-700/50 text-slate-400 border-slate-600/30',
                    'Process': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
                    'Finishing': 'bg-purple-500/20 text-purple-400 border-purple-500/30'
                };

                const priorityClass = order.priority === 'High' ? 'priority-high' : 
                                     order.priority === 'Medium' ? 'priority-medium' : 'priority-low';

                const allEq = order.equipment ? order.equipment.split(',').filter(e => e.trim() !== "") : [];
                const checkedEq = order.checkedEquipment ? order.checkedEquipment.split(',').filter(e => e.trim() !== "") : [];
                const progress = allEq.length > 0 ? Math.round((checkedEq.length / allEq.length) * 100) : 100;

                // Equipment UI
                const eqProgressUI = progress === 100 
                    ? `<div class="checkmark-ready"><i class="fas fa-check text-xs"></i></div>`
                    : `<div class="w-24 bg-slate-900 h-1.5 rounded-full overflow-hidden border border-slate-700/50">
                        <div class="bg-blue-600 h-full" style="width: ${progress}%"></div>
                       </div>`;

                // 1. Render Desktop Table Row
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="bg-slate-800/10 page-transition ${priorityClass}">
                        <td class="px-8 py-6">
                            <div class="flex flex-col">
                                <span class="text-[9px] font-mono text-slate-500 mb-1 tracking-widest">${order.id}</span>
                                <span class="font-bold text-lg text-white tracking-tight">${order.customer}</span>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <span class="text-base font-semibold text-slate-200">${order.jobName}</span>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Qty: ${order.quantity}</p>
                        </td>
                        <td class="px-8 py-6 text-center">
                            <div class="flex justify-center gap-6">
                                <div>
                                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Tahap</p>
                                    <span class="text-xs font-bold ${getRelativeTime(order.statusDeadline).color}">${getRelativeTime(order.statusDeadline).text}</span>
                                </div>
                                <div class="w-[1px] h-8 bg-slate-700/50"></div>
                                <div>
                                    <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Final</p>
                                    <span class="text-xs font-bold ${getRelativeTime(order.finalDeadline).color}">${getRelativeTime(order.finalDeadline).text}</span>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <div class="flex items-center gap-3">
                                ${eqProgressUI}
                                <span class="text-[10px] font-bold text-slate-500">${progress}%</span>
                            </div>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <span class="status-badge ${statusClasses[order.status] || 'bg-slate-700 text-slate-400'}">${order.status}</span>
                        </td>
                    </tr>
                `);

                // 2. Render Mobile Card
                mobileBody.insertAdjacentHTML('beforeend', `
                    <div class="p-4 bg-slate-800/20 page-transition ${priorityClass}">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <p class="text-[8px] font-mono text-slate-500 tracking-widest mb-0.5">${order.id}</p>
                                <h4 class="font-bold text-base text-white">${order.customer}</h4>
                            </div>
                            <span class="status-badge ${statusClasses[order.status] || 'bg-slate-700 text-slate-400'}">${order.status}</span>
                        </div>
                        
                        <div class="mb-4">
                            <p class="text-sm text-slate-300 font-medium">${order.jobName}</p>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">Estimasi Qty: ${order.quantity}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4 bg-slate-900/40 p-3 rounded-xl border border-slate-700/30">
                            <div>
                                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Deadline Final</p>
                                <p class="text-xs font-bold ${getRelativeTime(order.finalDeadline).color}">${getRelativeTime(order.finalDeadline).text}</p>
                            </div>
                            <div class="flex flex-col items-end">
                                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Alat Ready</p>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold text-slate-400">${progress}%</span>
                                    ${eqProgressUI}
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = allOrdersRaw.length;
            document.getElementById('stat-pending').innerText = activeOrders.length;
            document.getElementById('stat-priority').innerText = activeOrders.filter(o => o.priority === 'High').length;
            document.getElementById('stat-completed').innerText = allOrdersRaw.length - activeOrders.length;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('liveDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
        }

        window.addEventListener('resize', () => {
            adjustItemsPerPage();
            renderPage();
        });

        window.onload = () => {
            adjustItemsPerPage();
            fetchData();
            setInterval(fetchData, 60000); 
            setInterval(() => { 
                const totalPages = Math.ceil(activeOrders.length / itemsPerPage);
                if (totalPages > 1) {
                    currentPage = (currentPage + 1) % totalPages;
                    renderPage(); 
                } else if (currentPage !== 0) {
                    currentPage = 0;
                    renderPage();
                }
            }, 8000); 
            setInterval(updateClock, 1000);
            updateClock();
        };
    </script>
</body>
</html>
